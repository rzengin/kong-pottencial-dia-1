server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: kong-access-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: kong-gateway
          __path__: /kong-logs/kong-access.log
    pipeline_stages:
      - json:
          expressions:
            status: response.status
            method: request.method
            path: request.uri
            service: service.name
            latency: latencies.kong
      - labels:
          status:
          method:
          service:
