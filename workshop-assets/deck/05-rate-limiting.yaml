_format_version: "3.0"
services:
  - name: flights
    url: http://host.docker.internal:8080/flights
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: acl
        config:
          allow:
            - external
    routes:
      - name: flights-route
        paths:
          - /flights
        methods:
          - GET
  - name: routes
    url: http://host.docker.internal:8080/routes
    routes:
      - name: routes-route
        paths:
          - /routes
  - name: customers
    url: http://host.docker.internal:8080/customers
    routes:
      - name: customers-route
        paths:
          - /customers
  - name: bookings
    url: http://host.docker.internal:8080/bookings
    routes:
      - name: bookings-route
        paths:
          - /bookings

consumers:
  - username: App-External
    keyauth_credentials:
      - key: my-external-key
    acls:
      - group: external
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
  - username: App-Internal
    keyauth_credentials:
      - key: my-internal-key
    acls:
      - group: internal
    plugins:
      - name: rate-limiting
        config:
          minute: 3
          policy: local
