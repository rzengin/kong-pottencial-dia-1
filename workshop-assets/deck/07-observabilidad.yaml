_format_version: "3.0"
services:
  - name: flights
    url: http://host.docker.internal:8081/anything/flights
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: acl
        config:
          allow:
            - external
      - name: response-transformer
        config:
          add:
            headers:
              - "x-perceptiva: true"
          remove:
            headers:
              - "Connection"
      - name: correlation-id
        config:
          header_name: x-correlation-id
          echo_downstream: true
          generator: uuid
    routes:
      - name: flights-route
        paths:
          - /flights
        methods:
          - GET

  - name: routes
    url: http://host.docker.internal:8081/anything/routes
    routes:
      - name: routes-route
        paths:
          - /routes

  - name: customers
    url: http://host.docker.internal:8081/anything/customers
    routes:
      - name: customers-route
        paths:
          - /customers

  - name: bookings
    url: http://host.docker.internal:8081/anything/bookings
    routes:
      - name: bookings-route
        paths:
          - /bookings

  - name: debug-headers
    url: http://host.docker.internal:8081/headers
    routes:
      - name: debug-headers-route
        paths:
          - /debug/headers
        plugins:
          - name: request-transformer
            config:
              add:
                headers:
                  - "x-inter-env: lab"

consumers:
  - username: App-External
    keyauth_credentials:
      - key: my-external-key
    acls:
      - group: external
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
  - username: App-Internal
    keyauth_credentials:
      - key: my-internal-key
    acls:
      - group: internal
    plugins:
      - name: rate-limiting
        config:
          minute: 3
          policy: local

plugins:
  # 1. Almacenamiento en File Systems (Archivos Locales)
  - name: file-log
    config:
      path: /tmp/kong-access.log

  # 2. Métricas Externas
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  # 3. Trazas Externas (Ej. Jaeger a través de OTLP)
  - name: opentelemetry
    config:
      traces_endpoint: http://host.docker.internal:4318/v1/traces
      resource_attributes:
        service.name: kong-api-gateway
        os.name: linux

  # 4. Logs Externos Centralizados (Ej. Loki/Logstash via HTTP)
  - name: http-log
    config:
      http_endpoint: http://host.docker.internal:3100/loki/api/v1/push
      method: POST
      content_type: application/json
      timeout: 10000
