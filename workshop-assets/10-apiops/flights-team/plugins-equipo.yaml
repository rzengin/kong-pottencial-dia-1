# ============================================================================
# FLIGHTS TEAM — Plugins propios del equipo
#
# Aplicado con: deck file add-plugins --state kong-from-oas.yaml flights-team/plugins-equipo.yaml
#
# Formato requerido por "deck file add-plugins":
#   https://developer.konghq.com/deck/file/manipulation/plugins/
# ============================================================================
_format_version: "1.0"

add-plugins:
  # ── Correlation ID (tracking de request end-to-end) ──────────────────────
  - selectors:
      - "$..services[?(@.name=='flights')]"
    overwrite: false
    plugins:
      - name: correlation-id
        enabled: true
        config:
          header_name: x-correlation-id
          generator: uuid#counter
          echo_downstream: true

  # ── Response Transformer (header de marca del equipo) ─────────────────────
  - selectors:
      - "$..services[?(@.name=='flights')]"
    overwrite: false
    plugins:
      - name: response-transformer
        enabled: true
        config:
          add:
            headers:
              - "x-perceptiva:true"
              - "x-powered-by:kong-gateway"
