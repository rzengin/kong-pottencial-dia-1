# ============================================================================
# PLATFORM TEAM — Ruleset de Conformance decK
#
# Aplicado con: deck file lint --ruleset platform-team/linting-rules.yaml
#
# Equivale al konnect-lint-deck.yaml de KongAirlines.
# Asegura que TODAS las APIs del workshop cumplan con los estándares
# del Platform Team antes de llegar al deck gateway sync.
# ============================================================================

rules:
  # Todos los servicios deben estar etiquetados con el nombre del equipo
  service-must-have-team-tag:
    description: "Todos los services deben tener al menos un tag de equipo (flights-team, bookings-team, etc.)"
    message: "Service '{{value}}' no tiene tags definidos. El Platform Team requiere etiquetas."
    severity: warn
    given: "$.services[*]"
    then:
      field: tags
      function: truthy

  # Todas las rutas deben tener nombre explícito
  route-must-have-name:
    description: "Todas las routes deben tener un nombre explícito para facilitar la observabilidad"
    message: "Route sin nombre detectada. Agrega un campo 'name' a la route."
    severity: error
    given: "$.services[*].routes[*]"
    then:
      field: name
      function: truthy

  # Los servicios deben tener un path de upstream válido
  service-must-have-url:
    description: "Todos los services deben tener una URL de upstream configurada"
    message: "Service sin URL de upstream."
    severity: error
    given: "$.services[*]"
    then:
      field: url
      function: truthy

  # El formato de versión debe ser válido
  format-version-must-be-3:
    description: "Todas las configuraciones deben usar _format_version: '3.0'"
    message: "La versión del formato debe ser '3.0' para compatibilidad con decK."
    severity: warn
    given: "$"
    then:
      field: _format_version
      function: pattern
      functionOptions:
        match: "^3\\.0$"
