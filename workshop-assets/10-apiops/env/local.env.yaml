# ============================================================================
# ENV — Variables de entorno: local (workshop)
#
# Aplicado con: deck file patch --state <input.yaml> --state env/local.env.yaml
#
# Permite separar la config base (generada del OAS) de los valores
# específicos del entorno (URLs de backend, timeouts, etc.).
#
# Equivale al paso 5 de KongAir: "deck file patch" con env_vars del Platform Team.
# En producción habría env/staging.env.yaml y env/prod.env.yaml.
# ============================================================================
_format_version: "3.0"

# Parches de URL de upstream por servicio
# La URL generada por openapi2kong apunta a la spec — aquí la reemplazamos
# con la URL real del backend local (Prism mock corriendo en localhost:8080).
_patches:
  - op: replace
    path: /services/[name=flights]/url
    value: "http://host.docker.internal:8080/flights"

  - op: replace
    path: /services/[name=bookings]/url
    value: "http://host.docker.internal:8080/bookings"

  - op: replace
    path: /services/[name=customers]/url
    value: "http://host.docker.internal:8080/customers"

  - op: replace
    path: /services/[name=routes]/url
    value: "http://host.docker.internal:8080/routes"
